name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate & Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/vscode-project-launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/vscode-project-launcher/package.json

      - name: Install dependencies
        run: npm install

      - name: Validate extension.js syntax
        run: node --check extension.js

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: tools/vscode-project-launcher/*.vsix
          retention-days: 7
